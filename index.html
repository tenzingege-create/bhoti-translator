<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoti Pro Internal Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tibetan:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { background: #e0e7ff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-card { width: 100%; max-width: 400px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .tabs { display: flex; background: #f1f5f9; margin: 15px; border-radius: 10px; padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: bold; color: #64748b; }
        .tab-btn.active { background: white; color: var(--primary); border-radius: 8px; }
        .content { padding: 20px; }
        .mode-content { margin-bottom: 15px; border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 10px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header"><h1>Bhoti Pro</h1></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="uiSwitch(this, 'text')">Text</button>
        <button class="tab-btn" onclick="uiSwitch(this, 'camera')">Camera</button>
        <button class="tab-btn" onclick="uiSwitch(this, 'upload')">Upload</button>
    </div>

    <div class="content">
        <div id="section-camera" style="display:none;" class="mode-content">📷 Camera Module Active</div>
        <div id="section-upload" style="display:none;" class="mode-content">📁 Upload Module Active</div>
        
        <textarea id="output" readonly placeholder="Result will show here..."></textarea>
        <button class="btn-main" onclick="runTest()">Translate Now (Test)</button>
    </div>
</div>

<script>
    function uiSwitch(btn, mode) {
        // Hide sections
        document.getElementById('section-camera').style.display = 'none';
        document.getElementById('section-upload').style.display = 'none';
        
        // Reset buttons
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Show selected
        if(mode === 'camera') document.getElementById('section-camera').style.display = 'block';
        if(mode === 'upload') document.getElementById('section-upload').style.display = 'block';
    }

    function runTest() {
        document.getElementById('output').value = "བཀྲ་ཤིས་བདེ་ལེགས། (Success!)";
    }
</script>

</body>
</html>
