<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoti Translator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tibetan:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-card">
    <div class="header">
        <div class="brand-icon">BT</div>
        <h1>Bhoti Pro</h1>
        <p>English ↔ Tibetan</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode(event, 'text')">Text</button>
        <button class="tab-btn" onclick="switchMode(event, 'camera')">Camera</button>
        <button class="tab-btn" onclick="switchMode(event, 'upload')">Upload</button>
    </div>

    <div class="content">
        <div id="camera-section" class="mode-content" style="display:none;">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <div class="capture-btn" onclick="takeSnapshot()"></div>
            </div>
            <button class="btn-sec" onclick="startCamera()">🔄 Restart Camera</button>
        </div>

        <div id="upload-section" class="mode-content" style="display:none;">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <span style="font-size: 2rem;">📁</span>
                <p>Click to Upload Image</p>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileUpload(event)">
            </div>
        </div>

        <img id="preview-img" src="" alt="Preview">
        
        <div class="controls">
            <select id="sourceLang">
                <option value="English">English</option>
                <option value="Tibetan">Tibetan</option>
            </select>
            <span class="arrow">⇄</span>
            <select id="targetLang">
                <option value="Tibetan" selected>Tibetan</option>
                <option value="English">English</option>
            </select>
        </div>

        <textarea id="inputText" placeholder="Type your text here..."></textarea>
        
        <button id="translateBtn" class="btn-main" onclick="processTranslation()">Translate Now</button>
        
        <div class="output-container">
            <textarea id="outputText" readonly placeholder="Translation will appear here..."></textarea>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<script src="script.js"></script>
</body>
</html>
