<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoti Pro - Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tibetan:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; }
        body { background: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .app-card { width: 100%; max-width: 420px; background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        
        /* Navigation Tabs */
        .tabs { display: flex; background: #f1f5f9; margin: 15px; border-radius: 12px; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: 600; color: #64748b; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .content { padding: 0 20px 20px 20px; }
        
        /* Sections */
        .mode-section { display: none; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        .mode-section.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .camera-box { width: 100%; height: 250px; background: #000; border-radius: 15px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .snap-btn { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 50px; height: 50px; border-radius: 50%; border: 4px solid white; background: rgba(255,255,255,0.3); cursor: pointer; }

        .upload-box { border: 2px dashed #cbd5e1; border-radius: 15px; padding: 40px 10px; text-align: center; color: #64748b; cursor: pointer; }
        
        #preview-img { width: 100%; border-radius: 12px; display: none; margin-top: 15px; border: 1px solid #ddd; }

        textarea { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; font-size: 16px; margin: 15px 0; box-sizing: border-box; resize: none; }
        #outputText { font-family: 'Noto Sans Tibetan', serif; line-height: 2.4; background: #f8fafc; height: 140px; }

        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1 style="margin:0">Bhoti Pro</h1>
        <p style="margin:5px 0 0; opacity:0.8">Translation Suite</p>
    </div>

    <div class="tabs">
        <button id="tab-text" class="tab-btn active" onclick="showMode('text')">Text</button>
        <button id="tab-camera" class="tab-btn" onclick="showMode('camera')">Camera</button>
        <button id="tab-upload" class="tab-btn" onclick="showMode('upload')">Upload</button>
    </div>

    <div class="content">
        <div id="section-text" class="mode-section active">
            <p style="text-align: center; color: #64748b;">Type your phrase below</p>
        </div>

        <div id="section-camera" class="mode-section">
            <div class="camera-box">
                <video id="video" autoplay playsinline></video>
                <div class="snap-btn" onclick="takeSnapshot()"></div>
            </div>
            <p style="text-align:center; font-size: 12px; color: #64748b; margin-top: 10px;">Tap circle to capture</p>
        </div>

        <div id="section-upload" class="mode-section">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <span style="font-size: 30px;">📁</span>
                <p>Select from Gallery</p>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(event)">
            </div>
        </div>

        <img id="preview-img" src="" alt="Captured Image">

        <textarea id="inputText" placeholder="Enter English text..."></textarea>
        <button class="btn-main" onclick="doTranslate()">Translate Now</button>
        <textarea id="outputText" readonly placeholder="Tibetan result..."></textarea>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    let capturedImg = null;
    let videoStream = null;

    function showMode(mode) {
        // 1. Reset all Tabs
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active'));
        
        // 2. Activate clicked
        document.getElementById('tab-' + mode).classList.add('active');
        document.getElementById('section-' + mode).classList.add('active');

        // 3. Stop camera if switching away
        if (mode !== 'camera') stopCamera();
        if (mode === 'camera') startCamera();
        
        // 4. Reset Image Preview
        capturedImg = null;
        document.getElementById('preview-img').style.display = 'none';
    }

    async function startCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = videoStream;
        } catch (err) {
            alert("Please allow camera access in your browser settings.");
        }
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
    }

    function takeSnapshot() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        capturedImg = canvas.toDataURL('image/jpeg');
        const preview = document.getElementById('preview-img');
        preview.src = capturedImg;
        preview.style.display = 'block';
        
        stopCamera();
        document.getElementById('section-camera').classList.remove('active');
    }

    function handleFile(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            capturedImg = reader.result;
            const preview = document.getElementById('preview-img');
            preview.src = capturedImg;
            preview.style.display = 'block';
            document.getElementById('section-upload').classList.remove('active');
        };
        if(file) reader.readAsDataURL(file);
    }

    function doTranslate() {
        const out = document.getElementById('outputText');
        out.value = "Processing... (Debug Mode)";
        
        setTimeout(() => {
            out.value = "བཀྲ་ཤིས་བདེ་ལེགས། \n(This is a successful test!)";
        }, 1000);
    }
</script>

</body>
</html>
